<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Book Your Session | ATD Soccer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .booking-page {
        max-width: 760px;
        margin: 0 auto;
        padding: clamp(48px, 8vw, 96px) 20px;
      }

      .status-box {
        padding: 20px 24px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .status-box p {
        margin: 0;
        color: var(--muted);
      }

      #cal-embed {
        min-width: 320px;
        height: 700px;
        margin-top: 28px;
      }
    </style>
  </head>
  <body>
    <main class="booking-page">
      <p class="eyebrow">ATD Soccer</p>
      <h1 id="booking-heading">Confirming your purchase&hellip;</h1>
      <div id="status" class="status-box">
        <p>Hang tight while we confirm your payment with Stripe.</p>
      </div>
      <div id="cal-embed"></div>
    </main>

    <script type="text/javascript">
      (function (C, A, L) {
        let p = function (a, ar) { a.q.push(ar); };
        let d = C.document;
        C.Cal = C.Cal || function () {
          let cal = C.Cal;
          let ar = arguments;
          if (!cal.loaded) {
            cal.ns = {};
            cal.q = cal.q || [];
            d.head.appendChild(d.createElement("script")).src = A;
            cal.loaded = true;
          }
          if (ar[0] === L) {
            const api = function () { p(api, arguments); };
            const namespace = ar[1];
            api.q = api.q || [];
            if (typeof namespace === "string") {
              cal.ns[namespace] = cal.ns[namespace] || api;
              p(cal.ns[namespace], ar);
              p(cal, ["initNamespace", namespace]);
            } else {
              p(cal, ar);
            }
            return;
          }
          p(cal, ar);
        };
      })(window, "https://app.cal.com/embed/embed.js", "init");

      Cal("init", "booking", { origin: "https://cal.com" });
    </script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      const headingEl = document.getElementById('booking-heading');
      const statusEl = document.getElementById('status');
      async function checkAccess(attempt) {
        attempt = attempt || 1;

        if (!sessionId) {
          headingEl.textContent = 'No purchase found';
          statusEl.innerHTML = '<p>We couldn\u2019t find a session ID in this link. If you just paid, use the link from your Stripe receipt email, or contact us.</p>';
          return;
        }

        try {
          const res = await fetch('/api/booking-access?session_id=' + encodeURIComponent(sessionId));
          const data = await res.json();

          if (data.ok) {
            headingEl.textContent = "You're booked in for: " + data.plan;
            statusEl.innerHTML = '<p>Pick a time below to schedule your session.</p>';
            Cal.ns["booking"]("inline", {
              elementOrSelector: "#cal-embed",
              config: { layout: "month_view" },
              calLink: data.calLink
            });
            Cal.ns["booking"]("ui", {
              styles: { branding: { brandColor: "#050505" } },
              hideEventTypeDetails: false,
              layout: "month_view"
            });
            return;
          }

          // The webhook usually lands within a second or two of the redirect,
          // but give it a little room before giving up.
          if (attempt < 6) {
            statusEl.innerHTML = '<p>Still confirming your payment, one moment&hellip;</p>';
            setTimeout(() => checkAccess(attempt + 1), 2000);
          } else {
            headingEl.textContent = "We couldn't confirm your payment yet";
            statusEl.innerHTML = '<p>This can happen if the payment is still processing. Refresh this page in a minute, or contact us if the issue continues.</p>';
          }
        } catch (err) {
          headingEl.textContent = 'Something went wrong';
          statusEl.innerHTML = '<p>Please refresh the page or contact us for help.</p>';
        }
      }

      checkAccess();
    </script>
  </body>
</html>
